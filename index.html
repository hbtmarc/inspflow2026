<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InspFlow Revitalização</title>
  <meta name="description" content="Narrativa interativa da revitalização InspFlow com visão ponta a ponta.">
  <meta name="theme-color" content="#122b4f">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23122b4f'/><text x='5' y='24' font-size='22' fill='white'>I</text></svg>">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>

  <div class="shell">
    <header class="header">
      <div class="header-row">
        <div class="brand">
          <strong class="brand-name">InspFlow</strong>
          <span class="brand-tag">Revitalização</span>
        </div>
        <span class="status" id="status-label" aria-live="polite">Cena 1 de 10</span>
      </div>

      <div class="progress" aria-label="Progresso da narrativa">
        <span id="progress-bar"></span>
      </div>

      <nav class="nav" id="scene-nav" aria-label="Navegação de cenas"></nav>
    </header>

    <main id="main" tabindex="-1"></main>

    <footer class="toolbar" aria-label="Controles da apresentação">
      <div class="toolbar-group">
        <button class="btn" id="btn-prev" type="button">Anterior</button>
        <button class="btn btn--primary" id="btn-next" type="button">Próxima</button>
      </div>
      <div class="toolbar-group">
        <button class="btn btn--ghost" id="btn-home" type="button">Início</button>
        <button class="btn btn--ghost" id="btn-end" type="button">Fim</button>
        <button class="btn" id="btn-presenter" type="button" aria-pressed="false">Apresentador</button>
      </div>
    </footer>

    <p class="presenter-hint" aria-live="off">
      <strong>Modo apresentador ativo.</strong> Use <kbd>←</kbd>/<kbd>→</kbd> e <kbd>Home</kbd>/<kbd>End</kbd>.
    </p>
  </div>

  <aside id="presenter-console" class="console" hidden aria-label="Console do apresentador">
    <header class="console-header">
      <h2 class="console-title">Console do Apresentador</h2>
      <div class="console-timer-wrap">
        <span class="console-chip" id="console-timer">00:00</span>
        <span class="console-state" id="console-timer-state">Em execução</span>
      </div>
    </header>

    <section class="console-block" aria-live="polite">
      <h3 class="console-block-title">Cena atual</h3>
      <p class="console-scene-name" id="console-scene-title">Aguardando navegação</p>
    </section>

    <section class="console-block">
      <h3 class="console-block-title">Notas do apresentador</h3>
      <p class="console-notes" id="console-notes">Sem notas desta cena.</p>
    </section>

    <section class="console-block">
      <h3 class="console-block-title">Lista de cenas</h3>
      <ul class="console-scene-list" id="console-scene-list"></ul>
    </section>

    <footer class="console-controls" aria-label="Controles do apresentador">
      <button class="btn" id="pc-prev" type="button">Anterior</button>
      <button class="btn btn--primary" id="pc-next" type="button">Próxima</button>
      <button class="btn" id="pc-home" type="button">Início</button>
      <button class="btn" id="pc-end" type="button">Fim</button>
      <button class="btn" id="pc-fullscreen" type="button" aria-pressed="false">Tela cheia</button>
      <button class="btn btn--ghost" id="pc-helpers" type="button" aria-pressed="true">Alternar auxiliares (P)</button>
    </footer>
  </aside>

  <div id="sr-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <div id="update-toast" class="toast" hidden role="status" aria-live="polite">
    <p>Nova versão disponível.</p>
    <div class="toast-actions">
      <button type="button" id="update-refresh" class="btn btn--primary btn--sm">Atualizar</button>
      <button type="button" id="update-dismiss" class="btn btn--sm">Depois</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
