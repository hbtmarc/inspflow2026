<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InspFlow | Offline</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f7fb;
      color: #142033;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 1rem;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border: 1px solid #d6e1ee;
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 8px 20px rgba(20, 32, 51, 0.08);
      display: grid;
      gap: .75rem;
    }
    h1 { margin: 0; font-size: 1.25rem; color: #0d2c57; }
    p { margin: 0; color: #4e5f78; }
    a {
      display: inline-block;
      width: fit-content;
      margin-top: .5rem;
      text-decoration: none;
      background: #123a73;
      color: #fff;
      border-radius: 10px;
      padding: .6rem .9rem;
    }
  </style>
</head>
<body>
  <article class="card" aria-labelledby="offline-title">
    <h1 id="offline-title">Você está offline</h1>
    <p>Não foi possível acessar a versão mais recente agora. Use a última versão em cache ou tente novamente quando a conexão voltar.</p>
    <a href="./index.html#home">Voltar ao início</a>
  </article>
</body>
</html>
